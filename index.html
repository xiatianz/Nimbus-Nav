<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbus Nav</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- 顶部栏：Logo + 登录/用户 -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">Nimbus Nav</h1>
        <p class="subtitle">你的私人导航，跨设备同步</p>
      </div>
      <div class="header-right" id="authArea">
        <!-- 未登录：统一登录按钮 -->
        <button class="login-btn" id="loginBtn">登录 / 注册</button>
        <!-- 已登录：用户信息 + 菜单（初始隐藏） -->
        <div class="user-menu" id="userMenu" style="display:none;">
          <button class="user-avatar-btn" id="userAvatarBtn">
            <img class="user-avatar" id="userAvatar" src="" alt="">
            <span class="sync-dot" id="syncDot" title="已同步"></span>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <div class="dropdown-header">
              <span id="userName"></span>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="syncBtn">
              <span class="dropdown-icon">🔄</span> 同步到云端
            </button>
            <button class="dropdown-item" id="logoutBtn">
              <span class="dropdown-icon">🚪</span> 退出登录
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- 搜索 -->
    <div class="search-wrapper">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索或输入网址...">
        <button id="searchBtn" class="search-btn">搜索</button>
      </div>
      <div class="search-engines">
        <span class="engine-tag active" data-engine="baidu" data-url="https://www.baidu.com/s?wd=">百度</span>
        <span class="engine-tag" data-engine="google" data-url="https://www.google.com/search?q=">Google</span>
        <span class="engine-tag" data-engine="bing" data-url="https://www.bing.com/search?q=">Bing</span>
        <span class="engine-tag" data-engine="duckduckgo" data-url="https://duckduckgo.com/?q=">DuckDuckGo</span>
      </div>
    </div>

    <!-- 动态分类容器 -->
    <div id="categoriesContainer"></div>

    <!-- 页脚 -->
    <footer class="footer">
      <div class="footer-neumorph">
        <p>Nimbus Nav &copy; 2026 · Neumorphism Design</p>
      </div>
    </footer>
  </div>

  <!-- ====== 添加/编辑书签弹窗 ====== -->
  <div class="modal-overlay" id="bookmarkModal">
    <div class="modal">
      <h3 class="modal-title" id="bookmarkModalTitle">添加书签</h3>
      <div class="form-group">
        <label>名称</label>
        <input type="text" id="bmName" class="form-input" placeholder="网站名称">
      </div>
      <div class="form-group">
        <label>网址</label>
        <input type="text" id="bmUrl" class="form-input" placeholder="https://">
      </div>
      <div class="form-group">
        <label>描述</label>
        <input type="text" id="bmDesc" class="form-input" placeholder="简短描述">
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="bmCategory" class="form-input form-select"></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="bmCancelBtn">取消</button>
        <button class="btn btn-confirm" id="bmConfirmBtn">确认</button>
      </div>
      <input type="hidden" id="bmEditId">
    </div>
  </div>

  <!-- ====== 添加/编辑分类弹窗 ====== -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <h3 class="modal-title" id="categoryModalTitle">添加分类</h3>
      <div class="form-group">
        <label>分类名称</label>
        <input type="text" id="catName" class="form-input" placeholder="分类名称">
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="catCancelBtn">取消</button>
        <button class="btn btn-danger" id="catDeleteBtn" style="display:none;">删除分类</button>
        <button class="btn btn-confirm" id="catConfirmBtn">确认</button>
      </div>
      <input type="hidden" id="catEditId">
    </div>
  </div>

  <!-- ====== 统一登录弹窗 ====== -->
  <div class="modal-overlay" id="authModal">
    <div class="modal auth-modal">
      <!-- 登录/注册模式 -->
      <div id="authFormView">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin">登录</button>
          <button class="auth-tab" id="tabRegister">注册</button>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="authEmail" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="authPassword" class="form-input" placeholder="至少 6 位" autocomplete="current-password">
        </div>
        <div class="auth-forgot" id="forgotLink">忘记密码？</div>
        <button class="btn btn-confirm auth-full-btn" id="authSubmitBtn">登录</button>
        <div class="auth-divider"><span>或</span></div>
        <button class="btn btn-github" id="githubBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span>使用 GitHub 登录</span>
        </button>
      </div>
      <!-- 忘记密码模式 -->
      <div id="resetView" style="display:none;">
        <h3 class="modal-title">重置密码</h3>
        <p class="auth-hint">输入注册邮箱，我们会发送密码重置链接到你的邮箱。</p>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="resetEmail" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn btn-confirm auth-full-btn" id="resetSubmitBtn">发送重置链接</button>
        <div class="auth-back" id="backToLogin">← 返回登录</div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
